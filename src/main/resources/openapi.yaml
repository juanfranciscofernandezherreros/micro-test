openapi: 3.0.3
info:
  title: API de Transferencias Bancarias
  description: API para la gestión de transferencias bancarias
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Servidor local de desarrollo

tags:
  - name: transferencias
    description: Operaciones sobre transferencias bancarias

paths:
  /transferencias:
    post:
      tags:
        - transferencias
      summary: Crear una nueva transferencia
      operationId: crearTransferencia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferenciaRequest'
      responses:
        '201':
          description: Transferencia creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferenciaResponse'
        '400':
          description: Petición inválida
        '500':
          description: Error interno del servidor

    get:
      tags:
        - transferencias
      summary: Listar todas las transferencias
      operationId: listarTransferencias
      responses:
        '200':
          description: Lista de transferencias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransferenciaResponse'
        '500':
          description: Error interno del servidor

  /transferencias/{id}:
    get:
      tags:
        - transferencias
      summary: Obtener una transferencia por ID
      operationId: obtenerTransferenciaPorId
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador único de la transferencia
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Transferencia encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferenciaResponse'
        '404':
          description: Transferencia no encontrada
        '500':
          description: Error interno del servidor

components:
  schemas:
    TransferenciaRequest:
      type: object
      required:
        - cuentaOrigen
        - cuentaDestino
        - importe
        - moneda
      properties:
        cuentaOrigen:
          type: string
          description: Número de cuenta de origen
          example: "ES9121000418450200051332"
        cuentaDestino:
          type: string
          description: Número de cuenta de destino
          example: "ES8023100001180000012345"
        importe:
          type: number
          format: double
          description: Importe de la transferencia
          example: 150.75
        moneda:
          type: string
          description: Código ISO de la moneda
          example: "EUR"
        concepto:
          type: string
          description: Concepto o descripción de la transferencia (opcional)
          example: "Pago de alquiler"

    TransferenciaResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Identificador único de la transferencia
          example: 1
        cuentaOrigen:
          type: string
          description: Número de cuenta de origen
          example: "ES9121000418450200051332"
        cuentaDestino:
          type: string
          description: Número de cuenta de destino
          example: "ES8023100001180000012345"
        importe:
          type: number
          format: double
          description: Importe de la transferencia
          example: 150.75
        moneda:
          type: string
          description: Código ISO de la moneda
          example: "EUR"
        concepto:
          type: string
          description: Concepto o descripción de la transferencia
          example: "Pago de alquiler"
        estado:
          type: string
          description: Estado actual de la transferencia
          enum:
            - PENDIENTE
            - COMPLETADA
            - FALLIDA
          example: "PENDIENTE"
        fechaCreacion:
          type: string
          format: date-time
          description: Fecha y hora de creación de la transferencia
          example: "2026-04-24T10:30:00Z"
